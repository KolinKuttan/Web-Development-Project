<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StrideSync : Progress Tracker</title>

  <link rel="icon" type="image/png" href="StrideSynceFavicon.png">
  <link rel="stylesheet" href="../css files/style.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      margin: 0;
      padding: 0;
    }

    header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background-color: #000; 
        }

    .logo {
      font-size: 28px;
      font-weight: bold;
      background: linear-gradient(45deg, #ffcccc, #db7777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    .navigation {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: flex-end;
    }

    .navigation a {
      color: #ffecec !important;
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      white-space: nowrap;
    }

    .navigation a:hover {
      color: #ffcccc !important;
      text-shadow: 0 0 10px rgba(255, 204, 204, 0.5);
    }

    .navigation a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -5px;
      left: 0;
      background: linear-gradient(45deg, #ffcccc, #db7777);
      transition: width 0.3s ease;
    }

    .navigation a:hover::after {
      width: 100%;
    }

    main {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-top: 0;
      color: #000;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
      color: #444;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button[type="submit"] {
      background-color: #000;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background-color: #333;
    }
  </style>
</head>

<body>
  <header>
    <h2 class="logo">StrideSync</h2>
    <nav class="navigation">
        <a href="index.html">Home</a>
        <a href="About.html">About</a>
        <a href="Services.html">Services</a>
        <a href="Contact.html">Contact</a>
    </nav>
  </header>
  <main>
    <h2>Contact Us</h2>
    <form action="#" method="post">
      <label for="name">Name</label><br>
      <input type="text" id="name" name="name" required><br>

      <label for="email">Email</label><br>
      <input type="email" id="email" name="email" required><br>

      <label for="subject">Subject</label><br>
      <input type="text" id="subject" name="subject" required><br>

      <label for="message">Message</label><br>
      <textarea id="message" name="message" rows="5" cols="40" required></textarea><br>

      <button type="submit">Send Message</button>
    </form>
  </main>

</body>
</html>
