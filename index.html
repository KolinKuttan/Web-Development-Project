<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrideSync : Progress Tracker</title>
<link rel="icon" type="Image/png" href="StrideSynceFavicon.png">
<link rel="stylesheet" href="css files/style.css">
    <style>
      background-image: url("trackimage.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    </style>
</head>

<body>
<header>
    <h2 class="logo">StrideSync</h2>
    <nav class="navigation">
        <a href="index.html">Home</a>
        <a href="About.html">About</a>
        <a href="Services.html">Services</a>
        <a href="Contact.html">Contact</a>
        <button class="btnLogin-popup">Login</button>
    </nav>
</header>

<!-- Popup wrapper -->
<section class="wrapper">
    <!-- Close button -->
    <span class="icon-close">X</span>

    <!-- Login Form -->
    <section class="form-box login">
        <h2>Login</h2>
        <form>
            <div class="input-box">
                <input type="email" placeholder=" " required>
                <label>Email</label>
            </div>
            <div class="input-box">
                <input type="password" placeholder=" " required>
                <label>Password</label>
            </div>
            <button type="submit" class="btn">Login</button>
            <p>Don't have an account? <a href="#" class="register-link">Register</a></p>
        </form>
    </section>

    <!-- Register Form -->
    <section class="form-box register">
        <h2>Register</h2>
        <form>
            <div class="input-box">
                <input type="text" placeholder=" " required>
                <label>Username</label>
            </div>
            <div class="input-box">
                <input type="email" placeholder=" " required>
                <label>Email</label>
            </div>
            <div class="input-box">
                <input type="password" placeholder=" " required>
                <label>Password</label>
            </div>
            <button type="submit" class="btn">Register</button>
            <p>Already have an account? <a href="#" class="login-link">Login</a></p>
        </form>
    </section>
</section>


<script src="../Script/script.js"></script>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
